<!-- @dsCard group="Colors" viewport="700x150" name="Brand / Accent" subtitle="Indigo-violet · primary buttons, active nav, links" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--color-bg);font-family:var(--font-sans)}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--elev-1)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;box-sizing:border-box}
  .n{font-size:11px;font-weight:700;letter-spacing:.02em}
  .h{font-family:var(--font-mono);font-size:10px;opacity:.9;margin-top:2px}
  .lite{color:var(--neutral-800)} .dark{color:#fff}
  .cap{margin-top:10px;font-size:12px;color:var(--text-secondary)}
</style>
</head>
<body>
  <div class="row">
    <div class="sw lite" style="background:var(--brand-50)"><span class="n">50</span><span class="h">#EFEEFC</span></div>
    <div class="sw lite" style="background:var(--brand-100)"><span class="n">100</span><span class="h">#E1DEFB</span></div>
    <div class="sw lite" style="background:var(--brand-200)"><span class="n">200</span><span class="h">#C7C1F8</span></div>
    <div class="sw lite" style="background:var(--brand-300)"><span class="n">300</span><span class="h">#A79EF3</span></div>
    <div class="sw dark" style="background:var(--brand-400)"><span class="n">400</span><span class="h">#8676EC</span></div>
    <div class="sw dark" style="background:var(--brand-500)"><span class="n">500</span><span class="h">#6B58E6</span></div>
    <div class="sw dark" style="background:var(--brand-600)"><span class="n">600 ·primary</span><span class="h">#5647E0</span></div>
    <div class="sw dark" style="background:var(--brand-700)"><span class="n">700 ·hover</span><span class="h">#4536C4</span></div>
    <div class="sw dark" style="background:var(--brand-800)"><span class="n">800</span><span class="h">#382C9C</span></div>
    <div class="sw dark" style="background:var(--brand-900)"><span class="n">900</span><span class="h">#2E2679</span></div>
  </div>
  <div class="cap">Violet-leaning indigo — deliberately distinct from the Informational blue used for pipeline stages.</div>
</body>
</html>
