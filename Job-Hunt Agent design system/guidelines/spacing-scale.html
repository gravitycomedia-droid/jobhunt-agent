<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px grid · 4 / 8 / 12 / 16 / 24 / 32 core" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--color-surface);font-family:var(--font-sans)}
  .row{display:flex;align-items:flex-end;gap:18px}
  .item{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
  .bar{background:var(--brand-500);border-radius:2px;height:44px}
  .t{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)}
  .px{font-weight:700;color:var(--text-primary)}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:var(--space-1)"></div><span class="t"><span class="px">4</span> · 1</span></div>
    <div class="item"><div class="bar" style="width:var(--space-2)"></div><span class="t"><span class="px">8</span> · 2</span></div>
    <div class="item"><div class="bar" style="width:var(--space-3)"></div><span class="t"><span class="px">12</span> · 3</span></div>
    <div class="item"><div class="bar" style="width:var(--space-4)"></div><span class="t"><span class="px">16</span> · 4</span></div>
    <div class="item"><div class="bar" style="width:var(--space-6)"></div><span class="t"><span class="px">24</span> · 6</span></div>
    <div class="item"><div class="bar" style="width:var(--space-8)"></div><span class="t"><span class="px">32</span> · 8</span></div>
    <div class="item"><div class="bar" style="width:var(--space-12)"></div><span class="t"><span class="px">48</span> · 12</span></div>
  </div>
</body>
</html>
