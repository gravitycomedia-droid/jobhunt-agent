<!-- @dsCard group="Type" viewport="700x300" name="Text Roles" subtitle="Plus Jakarta Sans · display → caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--color-surface);font-family:var(--font-sans);color:var(--text-primary)}
  .row{display:flex;align-items:baseline;gap:14px;padding:9px 0;border-bottom:1px solid var(--color-border)}
  .row:last-child{border-bottom:0}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);width:120px;flex:none}
  .display{font-size:var(--display-size);line-height:var(--display-line);font-weight:var(--display-weight);letter-spacing:var(--display-tracking)}
  .heading{font-size:var(--heading-size);line-height:var(--heading-line);font-weight:var(--heading-weight);letter-spacing:var(--heading-tracking)}
  .title{font-size:var(--title-size);line-height:var(--title-line);font-weight:var(--title-weight)}
  .body{font-size:var(--body-size);line-height:var(--body-line)}
  .caption{font-size:var(--caption-size);line-height:var(--caption-line);font-weight:var(--caption-weight);color:var(--text-secondary)}
</style>
</head>
<body>
  <div class="row"><span class="meta">display · 32/700</span><span class="display">Good morning, Alex</span></div>
  <div class="row"><span class="meta">heading · 22/700</span><span class="heading">Your matches today</span></div>
  <div class="row"><span class="meta">title · 16/600</span><span class="title">Senior Product Designer</span></div>
  <div class="row"><span class="meta">body · 15/400</span><span class="body">Tailored to emphasize your fintech and design-systems experience.</span></div>
  <div class="row"><span class="meta">caption · 13/500</span><span class="caption">San Francisco, CA · Posted 2 days ago</span></div>
</body>
</html>
