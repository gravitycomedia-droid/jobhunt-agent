document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 /* ---------- WARNING (amber) -----------------------------------\n     Gap chips · \"stretch\" verdict · stale-application banner */\n  --warning-50:  #FEF4E6;\n  --warning-100: #FCE6C2;\n  --warning-200: #F8CE86;\n  --warning-300: #F2B24C;\n  --warning-400: #E9971F;\n  --warning-500: #D07E0A;\n  --warning-600: #A9640A;\n  --warning-700: #85500C;\n  --warning-800: #6A400C;\n  --warning-900: #55340B;\n\n  /* ---------- CRITICAL (red) ------------------------------------\n     \"skip\" verdict · guardrail-fail highlight · rejected stage */\n  --critical-50:  #FDECEC;\n  --critical-100: #FAD5D5;\n  --critical-200: #F4AEAE;\n  --critical-300: #EC8080;\n  --critical-400: #E15656;\n  --critical-500: #D23A3A;\n  --critical-600: #B62B2B;\n  --critical-700: #96201F;\n  --critical-800: #7A1D1C;\n  --critical-900: #611A19;\n\n  /* ---------- INFORMATIONAL (blue) ------------------------------\n     Applied / replied / interview stages · source chips.\n     Pure blue — visually separated from the violet brand. */\n  --info-50:  #E7F1FC;\n  --info-100: #C9E1F9;\n  --info-200: #97C6F3;\n  --info-300: #5EA6EB;\n  --info-400: #2E88E0;\n  --info-500: #146FCB;\n  --info-600: #0E5AAA;\n  --info-700: #0C4A8C;\n  --info-800: #0B3D73;\n  --info-900: #0A325E;\n\n  /* ---------- NEUTRAL (grey, hue-biased toward brand ~275°) ------\n     Primary UI ramp. White & black bookends included. */\n  --neutral-0:   #FFFFFF;\n  --neutral-50:  #F7F7FB;\n  --neutral-100: #EFEFF5;\n  --neutral-200: #E2E2EC;\n  --neutral-300: #CBCBD9;\n  --neutral-400: #A0A0B4;\n  --neutral-500: #75758C;\n  --neutral-600: #565669;\n  --neutral-700: #40404F;\n  --neutral-800: #2A2A36;\n  --neutral-900: #181822;\n\n  /* ==============================================================\n     SEMANTIC ALIASES  —  use these in components\n     ============================================================== */\n\n  /* Surfaces & structure */\n  --color-bg:            var(--neutral-50);   /* app canvas */\n  --color-surface:       var(--neutral-0);    /* cards, sheets */\n  --color-surface-sunken:var(--neutral-100);  /* wells, inputs bg */\n  --color-border:        var(--neutral-200);  /* hairlines, card edge */\n  --color-border-strong: var(--neutral-300);  /* input outline */\n  --color-overlay:       rgba(24,24,34,0.48); /* scrim behind sheets */\n\n  /* Text */\n  --text-primary:   var(--neutral-900);\n  --text-secondary: var(--neutral-600);\n  --text-tertiary:  var(--neutral-500);\n  --text-disabled:  var(--neutral-400);\n  --text-on-brand:  var(--neutral-0);\n  --text-link:      var(--brand-600);\n  --text-link-hover:var(--brand-700);\n\n  /* Brand roles */\n  --brand:            var(--brand-600);\n  --brand-hover:      var(--brand-700);\n  --brand-soft:       var(--brand-50);   /* tinted bg */\n  --brand-soft-border:var(--brand-100);\n  --nav-active:       var(--brand-600);\n  --nav-inactive:     var(--neutral-400);\n  --focus-ring:       var(--brand-400);\n\n  /* Status: fill (solid), text (on soft bg), soft (tinted bg), border */\n  --success-fill: var(--success-600); --success-text: var(--success-700); --success-soft: var(--success-50); --success-border: var(--success-200);\n  --warning-fill: var(--warning-500); --warning-text: var(--warning-700); --warning-soft: var(--warning-50); --warning-border: var(--warning-200);\n  --critical-fill:var(--critical-600);--critical-text:var(--critical-700);--critical-soft:var(--critical-50);--critical-border:var(--critical-200);\n  --info-fill:    var(--info-600);    --info-text:    var(--info-700);    --info-soft:    var(--info-50);    --info-border:    var(--info-200);\n  --neutral-fill: var(--neutral-600); --neutral-text: var(--neutral-700); --neutral-soft: var(--neutral-100);--neutral-chip-border: var(--neutral-200);\n\n  /* ---- Verdict (apply / stretch / skip) ---- */\n  --verdict-apply:   var(--success-600);\n  --verdict-stretch: var(--warning-500);\n  --verdict-skip:    var(--critical-600);\n\n  /* ---- Guardrail (pass / fail) ---- */\n  --guardrail-pass:  var(--success-600);\n  --guardrail-fail:  var(--critical-600);\n  --guardrail-fail-highlight: var(--critical-100); /* diff text bg */\n\n  /* ---- Kanban stage (6 states) ---- */\n  --stage-new:       var(--neutral-500);\n  --stage-applied:   var(--info-600);\n  --stage-replied:   var(--info-500);\n  --stage-interview: var(--info-700);\n  --stage-offer:     var(--success-600);\n  --stage-rejected:  var(--critical-600);\n}\n\n/* ==================================================================\n   TYPOGRAPHY TOKENS — Job-Hunt Agent\n   Roles: display / heading / title / body / caption / label / mono-data\n   Base = 15px (mobile-first). Never render UI text below 12px.\n   ================================================================== */\n:root {\n  --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* weights */\n  --fw-regular: 400;\n  --fw-medium:  500;\n  --fw-semibold:600;\n  --fw-bold:    700;\n  --fw-extra:   800;\n\n  /* ---- DISPLAY — big numeric / screen hero (Home greeting, big scores) */\n  --display-size:   32px;\n  --display-line:   38px;\n  --display-weight: var(--fw-bold);\n  --display-tracking: -0.02em;\n\n  /* ---- HEADING — screen & section titles */\n  --heading-size:   22px;\n  --heading-line:   28px;\n  --heading-weight: var(--fw-bold);\n  --heading-tracking: -0.01em;\n\n  --heading-sm-size: 18px;\n  --heading-sm-line: 24px;\n  --heading-sm-weight: var(--fw-semibold);\n\n  /* ---- TITLE — card titles (job title, company row) */\n  --title-size:   16px;\n  --title-line:   22px;\n  --title-weight: var(--fw-semibold);\n\n  /* ---- BODY — default paragraph / list text */\n  --body-size:   15px;\n  --body-line:   22px;\n  --body-weight: var(--fw-regular);\n  --body-strong-weight: var(--fw-semibold);\n\n  --body-sm-size: 14px;\n  --body-sm-line: 20px;\n\n  /* ---- CAPTION — secondary meta (location, posted date) */\n  --caption-size:   13px;\n  --caption-line:   18px;\n  --caption-weight: var(--fw-medium);\n\n  /* ---- LABEL / OVERLINE — chips, section labels, nav labels */\n  --label-size:   11px;\n  --label-line:   14px;\n  --label-weight: var(--fw-semibold);\n  --label-tracking: 0.04em;   /* pair with text-transform:uppercase */\n\n  /* ---- MONO-DATA — scores, %, salary, token cost, dates */\n  --mono-size:   14px;\n  --mono-line:   20px;\n  --mono-weight: var(--fw-medium);\n  --mono-tracking: -0.01em;\n}\n\n/* ==================================================================\n   SPACING TOKENS — Job-Hunt Agent\n   Base grid: 4px. Core scale per brief: 4 / 8 / 12 / 16 / 24 / 32.\n   Extended with 2 / 20 / 40 / 48 / 64 for edge cases.\n   ================================================================== */\n:root {\n  --space-0:  0;\n  --space-05: 2px;   /* hairline nudges */\n  --space-1:  4px;   /* icon↔label, chip inner */\n  --space-2:  8px;   /* tight stack */\n  --space-3:  12px;  /* card inner padding (compact) */\n  --space-4:  16px;  /* default gutter / card padding */\n  --space-5:  20px;\n  --space-6:  24px;  /* section gap */\n  --space-8:  32px;  /* screen block gap */\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;  /* empty-state vertical breathing room */\n\n  /* Layout constants (portrait mobile) */\n  --screen-pad-x:   16px;  /* left/right safe gutter */\n  --bottomnav-h:    56px;  /* AppShell bottom bar height */\n  --touch-min:      44px;  /* minimum hit target */\n  --header-h:       52px;  /* top app-bar height */\n}\n\n/* ==================================================================\n   RADIUS TOKENS — Job-Hunt Agent\n   Soft, modern mobile feel. Cards = 16px, chips/pills = full.\n   ================================================================== */\n:root {\n  --radius-xs:  4px;   /* nested tags, tiny badges */\n  --radius-sm:  8px;   /* inputs, small buttons */\n  --radius-md:  12px;  /* buttons, inner tiles */\n  --radius-lg:  16px;  /* cards, sheets */\n  --radius-xl:  20px;  /* modal / bottom-sheet top */\n  --radius-2xl: 28px;  /* hero panels */\n  --radius-pill: 999px;/* chips, StatusPill, avatars */\n}\n\n/* ==================================================================\n   ELEVATION TOKENS — Job-Hunt Agent\n   Restrained mobile shadow system. Shadow tint uses the neutral\n   hue (indigo-biased) rather than pure black, so it reads warm-cool\n   consistent with the palette.\n   ================================================================== */\n:root {\n  /* e0 — flush (no shadow), rely on border */\n  --elev-0: none;\n\n  /* e1 — resting card on canvas */\n  --elev-1: 0 1px 2px rgba(24,24,34,0.06),\n            0 1px 3px rgba(24,24,34,0.05);\n\n  /* e2 — raised / pressed card, sticky headers */\n  --elev-2: 0 2px 4px rgba(24,24,34,0.06),\n            0 4px 10px rgba(24,24,34,0.08);\n\n  /* e3 — bottom nav, floating action, dropdowns */\n  --elev-3: 0 4px 12px rgba(24,24,34,0.10),\n            0 8px 24px rgba(24,24,34,0.10);\n\n  /* e4 — bottom sheets, modals */\n  --elev-4: 0 8px 20px rgba(24,24,34,0.12),\n            0 20px 48px rgba(24,24,34,0.16);\n\n  /* focus ring (pair with outline-offset:2px) */\n  --focus-shadow: 0 0 0 3px rgba(86,71,224,0.32);\n}\n\n<\u002Fstyle>\n<style>\n  @keyframes jha-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}\n  @keyframes jha-spin{to{transform:rotate(360deg)}}\n  @keyframes jha-toast{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}\n  @keyframes jha-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}\n  *{-webkit-tap-highlight-color:transparent}\n  body{margin:0;background:#e6e6ee}\n  a{color:var(--text-link)}a:hover{color:var(--text-link-hover)}\n  ::-webkit-scrollbar{width:0;height:0}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box; border-radius:var(--radius-md);background:var(--brand);color:#fff;font-family:var(--font-sans);font-size:15px;font-weight:700\">See growth plan<\u002Fbutton>\n          <button onclick=\"{{ act.dismissGrowth }}\" style=\"appearance:none;border:none;background:transparent;cursor:pointer;padding:10px;margin-top:2px;color:var(--text-tertiary);font-family:var(--font-sans);font-size:14px;font-weight:600\">Maybe later<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'splash', authMode: 'signup',\n    uploading: false, uploadPct: 0, resumeUploaded: false,\n    roles: ['Product Designer', 'Design Systems'], roleDraft: '',\n    profileEditFrom: 'onboarding', skillDraft: '',\n    profileData: {\n      skills: ['Design Systems', 'Prototyping', 'Fintech', '0→1', 'Figma', 'User Research', 'Accessibility'],\n      experience: [\n        { id: 'exp1', role: 'Senior Product Designer', company: 'Fintech Startup', dates: '2021 — Now', description: 'Led design systems and 0→1 product work for the core banking app.' },\n        { id: 'exp2', role: 'Product Designer', company: 'Design Agency', dates: '2018 — 2021', description: 'Delivered client design systems and prototypes across fintech and healthcare.' },\n        { id: 'exp3', role: 'UX Designer', company: 'SaaS Co', dates: '2016 — 2018', description: 'Owned onboarding and activation flows for a B2B analytics product.' },\n      ],\n      projects: [\n        { id: 'proj1', name: 'Design System Playbook', link: 'github.com/alexrivera/design-playbook', description: 'Open-sourced token and component guidelines, adopted by 3 portfolio companies.' },\n      ],\n      education: [\n        { id: 'edu1', school: 'University of California, Berkeley', degree: 'B.A. Cognitive Science', dates: '2012 — 2016' },\n      ],\n    },\n    savedIds: { j1: true, j3: true },\n    selectedMatchId: 'm1', selectedAppId: null,\n    diff: {}, userApps: [], appStage: {}, followupsDone: {},\n    settings: { alerts: true, autoTailor: false, followupNudge: true, autoApply: false },\n    matchingPct: 0,\n    manualJob: { link: '', parsing: false, parsed: false, fields: {} },\n    showGrowthModal: false, growthShown: false,\n    toast: null,\n  };\n\n  JOBS = [\n    { id: 'j1', title: 'Senior Product Designer', company: 'Northwind Labs', location: 'SF · Remote', source: 'LinkedIn', salary: '$150–185K', postedAt: '2d ago' },\n    { id: 'j2', title: 'Staff Product Designer', company: 'Acme Cloud', location: 'New York, NY', source: 'Greenhouse', salary: '$180–220K', postedAt: '4d ago' },\n    { id: 'j3', title: 'Design Systems Lead', company: 'Globex', location: 'Remote (US)', source: 'Lever', salary: '$170–205K', postedAt: '1d ago' },\n    { id: 'j4', title: 'Product Designer, Growth', company: 'Initech', location: 'Austin · Hybrid', source: 'LinkedIn', salary: '$135–160K', postedAt: '6h ago' },\n    { id: 'j5', title: 'Principal Designer', company: 'Umbrella', location: 'Seattle, WA', source: 'Ashby', salary: '$205–250K', postedAt: '3d ago' },\n    { id: 'j6', title: 'UX Designer, Payments', company: 'Stark Fintech', location: 'Remote', source: 'Greenhouse', salary: '$140–170K', postedAt: '5d ago' },\n  ];\n\n  MATCHES = [\n    { id: 'm1', title: 'Senior Product Designer', company: 'Northwind Labs', location: 'SF · Remote', source: 'LinkedIn', salary: '$150–185K', score: 92, verdict: 'apply', strengths: ['Design systems', 'Fintech', '0→1 product'], gaps: ['No Figma variables'] },\n    { id: 'm2', title: 'Design Systems Lead', company: 'Globex', location: 'Remote (US)', source: 'Lever', salary: '$170–205K', score: 88, verdict: 'apply', strengths: ['Systems at scale', 'Tokens', 'Docs'], gaps: ['People mgmt light'] },\n    { id: 'm3', title: 'Staff Product Designer', company: 'Acme Cloud', location: 'New York, NY', source: 'Greenhouse', salary: '$18 hing', amt: '$1.94', pct: 40, color: 'var(--info-fill)' },\n      { label: 'Tailoring', amt: '$2.16', pct: 45, color: 'var(--brand-600)' },\n      { label: 'Follow-ups', amt: '$0.72', pct: 15, color: 'var(--success-fill)' },\n    ],\n  };\n\n  STAGES = [['new', 'New'], ['applied', 'Applied'], ['replied', 'Replied'], ['interview', 'Interview'], ['offer', 'Offer'], ['rejected', 'Rejected']];\n\n  GROWTH_SKILLS = [\n    { id: 'sk1', name: 'Figma Variables & Tokens', impact: 20, reason: 'Shows up as a gap on 2 of your strongest matches, including Northwind Labs.' },\n    { id: 'sk2', name: 'People Management', impact: 14, reason: 'Blocking staff/principal-level roles that expect team leadership.' },\n    { id: 'sk3', name: 'B2B Enterprise UX', impact: 11, reason: 'Enterprise SaaS roles want workflow-heavy portfolio pieces.' },\n  ];\n  GROWTH_COURSES = [\n    { id: 'c1', title: 'Figma Variables & Design Tokens', provider: 'Design+Systems', duration: '3h', impact: 20 },\n    { id: 'c2', title: 'Managing Design Teams', provider: 'Coursera', duration: '6h', impact: 14 },\n    { id: 'c3', title: 'Enterprise UX Patterns', provider: 'Maven', duration: '4h', impact: 11 },\n  ];\n  GROWTH_PROJECTS = [\n    { id: 'p1', title: 'Rebuild a component library using Figma variables', impact: 'Strengthens your design-systems + tokens signal' },\n    { id: 'p2', title: 'Lead a small cross-functional pilot', impact: 'Demonstrates people-management experience' },\n  ];\n\n  componentWillUnmount() { clearInterval(this._iv); clearInterval(this._miv); clearTimeout(this._tt); }\n\n  go(screen) { this.setState({ screen }); }\n  notify(msg) { this.setState({ toast: msg }); clearTimeout(this._tt); this._tt = setTimeout(() => this.setState({ toast: null }), 1800); }\n\n  startUpload() {\n    if (this.state.uploading) return;\n    this.setState({ uploading: true, uploadPct: 0 });\n    this._iv = setInterval(() => {\n      this.setState(s => {\n        let p = s.uploadPct + 8 + Math.round(Math.random() * 7);\n        if (p >= 100) { p = 100; clearInterval(this._iv); setTimeout(() => this.setState({ uploading: false, resumeUploaded: true, screen: 'profileEdit', profileEditFrom: 'onboarding' }), 450); }\n        return { uploadPct: p };\n      });\n    }, 110);\n  }\n\n  addRoleDraft() {\n    const t = (this.state.roleDraft || '').trim().replace(/,$/, '').trim();\n    if (!t) return;\n    if (this.state.roles.includes(t)) { this.setState({ roleDraft: '' }); return; }\n    this.setState(s => ({ roles: [...s.roles, t], roleDraft: '' }));\n  }\n  onRoleKey(e) {\n    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); this.addRoleDraft(); }\n    else if (e.key === 'Backspace' && !this.state.roleDraft && this.state.roles.length) this.setState(s => ({ roles: s.roles.slice(0, -1) }));\n  }\n\n  addSkillDraft() {\n    const t = (this.state.skillDraft || '').trim().replace(/,$/, '').trim();\n    if (!t) return;\n    if (this.state.profileData.skills.includes(t)) { this.setState({ skillDraft: '' }); return; }\n    this.setState(s => ({ profileData: { ...s.profileData, skills: [...s.profileData.skills, t] }, skillDraft: '' }));\n  }\n  onSkillKey(e) {\n    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); this.addSkillDraft(); }\n    else if (e.key === 'Backspace' && !this.state.skillDraft && this.state.profileData.skills.length) this.setState(s => ({ profileData: { ...s.profileData, skills: s.profileData.skills.slice(0, -1) } }));\n  }\n  removeSkill(skill) { this.setState(s => ({ profileData: { ...s.profileData, skills: s.profileData.skills.filter(x => x !== skill) } })); }\n\n  updateListField(listName, id, field, value) {\n    this.setState(s => ({ profileData: { ...s.profileData, [listName]: s.profileData[listName].map(it => (it.id === id ? { ...it, [field]: value } : it)) } }));\n  }\n  addListItem(listName, blank) {\n    this.setState(s => ({ profileData: { ...s.profileData, [listName]: [...s.profileData[listName], { ...blank, id: listName + '
